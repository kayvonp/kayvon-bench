# Active defaults used when a profile argument is not provided.
active:
  llm_profile: together_gpt-oss-20b_public
  benchmark_profile: summarization_13000to600_quick

providers:
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    api_style: responses

  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    api_style: chat_completions

llm_profiles:
  openai_fast:
    provider: openai
    model: gpt-5-nano

  together_gpt-oss-20b_public:
    provider: together
    model: openai/gpt-oss-20b
    reasoning_effort: high

  together_gpt-oss-20b_dedicated_1xh100_no_reasoning:
    provider: together
    model: together_sso/openai/gpt-oss-20b-f0386028
    reasoning_effort: low

  together_gpt-oss-20b_dedicated_1xh100_low:
    provider: together
    model: together_sso/openai/gpt-oss-20b-f0386028
    reasoning_effort: low

  together_gpt-oss-20b_dedicated_2xh100_no_reasoning:
    provider: together
    model: together_sso/openai/gpt-oss-20b-05bdd42d
    reasoning_effort: low

  together_gpt-oss-20b_dedicated_2xh100_low:
    provider: together
    model: together_sso/openai/gpt-oss-20b-05bdd42d
    reasoning_effort: low

  together_gpt-oss-20b_dedicated_airwallex_1xh100:
    provider: together
    model: together_sso/openai/gpt-oss-20b-61f70b7f
    reasoning_effort: low

  together_gpt-oss-20b_private:
    provider: together
    model: kpirestani_0236/openai/gpt-oss-20b-398585b7
    reasoning_effort: high

  together_gpt-oss-120b_private:
    provider: together
    model: kpirestani_0236/openai/gpt-oss-120b-2fefaac0
    reasoning_effort: low

  together_qwen3_235b_thinking_private_no_spec_4xH200:
    provider: together
    model: together_sso/Qwen/Qwen3-235B-A22B-Thinking-2507-539e06a3

  together_qwen3_5_397b_fp8_private_no_spec_4xH200:
    provider: together
    model: together_sso/Qwen/Qwen3.5-397B-A17B-FP8-e2314544

  together_glm_5_serverless:
    provider: together
    model: zai-org/GLM-5
    streaming_enabled: true
    empty_visible_stream_retries: 1

  together_kimi_k2_5_dedicated:
    provider: together
    model: together_sso/moonshotai/Kimi-K2.5-070fc5a6
    reasoning_effort: low
    streaming_enabled: true
    temperature: 0.6
    empty_visible_stream_retries: 1

  together_qwen3_5_397b_serverless:
    provider: together
    model: Qwen/Qwen3.5-397B-A17B
    reasoning_effort: low
    streaming_enabled: true
    empty_visible_stream_retries: 1

  together_minimax_m2_5_serverless:
    provider: together
    model: MiniMaxAI/MiniMax-M2.5
    streaming_enabled: true
    empty_visible_stream_retries: 1

benchmark_profiles:
  summarization_4000to100_non_strict_smoke_dedicated_1xh100_low:
    diagnostic_mode: false
    llm_profile: together_gpt-oss-20b_dedicated_1xh100_low
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 300

    dataset_path: corpus/v1_summarization_4000to100_non_strict.jsonl
    sample_with_replacement: true
    random_seed: 42

    concurrency_levels: [2, 3, 4]
    request_sizing:
      mode: concurrency_scaled
      waves_per_level: 8
      min_requests: 8
      max_requests: 128
    progress_update_every: 1
    request_timeout_s: 90
    stop_on_saturation: false

  summarization_4000to100_non_strict_smoke_dedicated_2xh100_low:
    diagnostic_mode: false
    llm_profile: together_gpt-oss-20b_dedicated_2xh100_low
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 300

    dataset_path: corpus/v1_summarization_4000to100_non_strict.jsonl
    sample_with_replacement: true
    random_seed: 42

    concurrency_levels: [2, 3, 4]
    request_sizing:
      mode: concurrency_scaled
      waves_per_level: 8
      min_requests: 8
      max_requests: 128
    progress_update_every: 1
    request_timeout_s: 90
    stop_on_saturation: false

  summarization_4000to100_non_strict_smoke_dedicated:
    diagnostic_mode: false
    llm_profile: together_gpt-oss-20b_dedicated_1xh100_no_reasoning
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 300

    # Input dataset (JSONL). Sampling is done with replacement by default.
    dataset_path: corpus/v1_summarization_4000to100_non_strict.jsonl
    sample_with_replacement: true
    random_seed: 42

    # Very quick smoke test.
    concurrency_levels: [2, 4, 8, 16]
    request_sizing:
      mode: concurrency_scaled
      waves_per_level: 4
      min_requests: 4
      max_requests: 128
    progress_update_every: 1
    request_timeout_s: 90
    stop_on_saturation: false

  summarization_13000to600_quick:
    diagnostic_mode: false
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 1200
    # Uses active.llm_profile unless explicitly overridden elsewhere.

    # Input dataset (JSONL). Sampling is done with replacement by default.
    dataset_path: corpus/v1_summarization_13000to600.jsonl
    sample_with_replacement: true
    random_seed: 42

    # Fast smoke benchmark: 2 light ramp levels with a small request budget.
    concurrency_levels: [1, 2]
    request_sizing:
      mode: concurrency_scaled
      waves_per_level: 2
      min_requests: 4
      max_requests: 6
    progress_update_every: 1
    request_timeout_s: 90

    # For this quick profile, always run both levels.
    stop_on_saturation: false

  summarization_13000to600:
    diagnostic_mode: false
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 1800
    # Uses active.llm_profile unless explicitly overridden elsewhere.

    # Input dataset (JSONL). Sampling is done with replacement by default.
    dataset_path: corpus/v1_summarization_13000to600.jsonl
    sample_with_replacement: true
    random_seed: 42

    # Keep this quick but meaningful: ramp through selected concurrency levels and scale request volume by concurrency.
    concurrency_levels: [16, 32]
    request_sizing:
      mode: concurrency_scaled
      # Requests per level = max(min_requests, concurrency * waves_per_level),
      # optionally capped by max_requests.
      waves_per_level: 8
      min_requests: 16
      max_requests: 256
    progress_update_every: 3
    request_timeout_s: 90

    # Stop early when throughput plateaus/declines while tail latency spikes.
    stop_on_saturation: true
    min_levels_before_stop: 3
    saturation:
      throughput_plateau_pct: 0.03
      throughput_decline_pct: 0.07
      latency_spike_multiplier: 1.35

  summarization_20000to2500_non_strict:
    diagnostic_mode: false
    max_output_tokens_mode: fixed
    max_output_tokens_fixed: 7500
    # Uses active.llm_profile unless explicitly overridden elsewhere.

    # Input dataset (JSONL). Sampling is done with replacement by default.
    dataset_path: corpus/v1_summarization_20000to2500_non_strict.jsonl
    sample_with_replacement: true
    random_seed: 42

    # Keep this quick but meaningful: ramp through selected concurrency levels and scale request volume by concurrency.
    concurrency_levels: [2, 4]
    request_sizing:
      mode: concurrency_scaled
      # Requests per level = max(min_requests, concurrency * waves_per_level),
      # optionally capped by max_requests.
      waves_per_level: 8
      min_requests: 16
      max_requests: 256
    progress_update_every: 3
    request_timeout_s: 90

    # Stop early when throughput plateaus/declines while tail latency spikes.
    stop_on_saturation: true
    min_levels_before_stop: 3
    saturation:
      throughput_plateau_pct: 0.03
      throughput_decline_pct: 0.07
      latency_spike_multiplier: 1.35

